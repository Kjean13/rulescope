title: Suspicious PowerShell EncodedCommand Variant
id: 22222222-2222-2222-2222-222222222222
description: Detects PowerShell launched with an encoded command argument, which may indicate obfuscation or malicious execution.
status: experimental
author: Jean
date: 2026-03-18
references:
  - https://example.org/powershell-2
logsource:
  product: windows
  category: process_creation
detection:
  selection:
    Image|endswith: '\\powershell.exe'
    CommandLine|contains:
      - '-enc'
      - 'EncodedCommand'
  condition: selection
falsepositives:
  - administrative scripts
tags:
  - attack.execution
  - attack.t1059.001
level: medium
