name: RuleScope CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-test-build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint
        run: ruff check rulescope tests

      - name: Test
        run: pytest

      - name: Build package
        run: python -m build

      - name: Smoke test installed wheel
        run: |
          python -m pip install --force-reinstall dist/*.whl
          rulescope version
          rulescope scan examples/rules --format json --output report.json

      - name: Upload smoke artifact
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: rulescope-smoke-report
          path: report.json
