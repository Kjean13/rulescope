# RuleScope configuration — updated weights for operational credibility
# Structural axes (metadata, structural, maintainability) reduced:
# they're always near-perfect on maintained catalogs and don't discriminate quality.
# Operational axes (noise, weakness) raised: they reflect real SOC impact.

weights:
  metadata:        0.10  # YAML hygiene — necessary but not sufficient
  maintainability: 0.10  # code quality — same
  structural:      0.08  # schema validity — always near-perfect on maintained catalogs
  documentation:   0.10  # FP guidance and description quality
  attack_quality:  0.18  # ATT&CK mapping precision — operational impact
  noise:           0.22  # FP risk — directly impacts SOC analyst workload
  weakness:        0.22  # detection selectivity — core quality signal

ci_gate:
  min_score: 70
  max_duplicate_pairs: 10
  max_invalid_rules: 0
  fail_on_critical: true

budget:
  min_average_score: 70
  max_duplicate_clusters: 10
  max_overlap_pairs: 15
  max_high_noise_rules: 10
  max_weak_metadata_rules: 10
  max_invalid_rules: 0

exclude_paths: []
duplicate_threshold: 88
overlap_threshold: 75
